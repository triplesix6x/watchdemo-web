services:
  web:
    restart: on-failure
    build:
      context: ./web
    ports:
      - "8008:8008"
    command: poetry run fastapi run --port 8008 main.py
    volumes:
      - ./web:/app
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started

  mailer:
    restart: on-failure
    build:
      context: mail
    volumes:
      - ./mail:/app
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - watchdemo_db_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ__USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ__PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - watchdemo_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  watchdemo_db_data:
    driver: local
  watchdemo_rabbitmq_data:
    driver: local
